<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理組合の教科書｜マンション管理組合の実務情報サイト</title>
<meta name="description" content="管理組合の理事・理事長向けに、理事会運営・総会・管理会社変更・大規模修繕など実務でよくある疑問を解説します。全30記事・無料。">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',system-ui,sans-serif;line-height:1.9;color:#222;background:#f7f9fc}
header{background:#1a4a8a;color:#fff;padding:28px 20px 22px;text-align:center}
header h1{font-size:1.7rem;margin-bottom:4px;color:#fff;letter-spacing:.03em}
header p{font-size:.88rem;opacity:.85;margin:0}
.search-wrap{background:#fff;border-bottom:1px solid #dde3f0;padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.search-inner{max-width:860px;margin:0 auto;display:flex;gap:10px;align-items:center}
#searchBox{flex:1;padding:10px 14px;border:2px solid #c5d0e8;border-radius:6px;font-size:.97rem;font-family:inherit;outline:none;transition:border .2s}
#searchBox:focus{border-color:#1a4a8a}
.search-clear{background:none;border:none;font-size:1.2rem;color:#999;cursor:pointer;padding:4px 8px;border-radius:4px}
.search-clear:hover{color:#1a4a8a}
.filter-wrap{max-width:860px;margin:16px auto 0;padding:0 20px}
.filter-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.filter-btn{padding:6px 14px;border:2px solid #c5d0e8;background:#fff;border-radius:20px;font-size:.85rem;cursor:pointer;transition:all .2s;font-family:inherit;color:#555}
.filter-btn:hover,.filter-btn.active{background:#1a4a8a;border-color:#1a4a8a;color:#fff}
.main{max-width:860px;margin:0 auto;padding:20px 20px 60px}
.lead{background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:20px;font-size:.93rem;color:#444;border-left:4px solid #1a4a8a;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hero-image{margin:0 0 20px;border-radius:8px;overflow:hidden;border:1px solid #dde3f0;background:#edf6fb;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.hero-image img{display:block;width:100%;height:auto;aspect-ratio:20/9;object-fit:cover}
.starter{background:#fff;border-radius:8px;padding:16px 18px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #dde3f0}
.starter-title{font-weight:700;color:#1a4a8a;margin-bottom:10px;font-size:1rem}
.starter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.starter-grid a{display:block;text-decoration:none;color:#1a4a8a;background:#f5f8ff;border:1px solid #dce6f7;border-radius:6px;padding:10px 12px;font-size:.9rem;line-height:1.45;transition:all .15s}
.starter-grid a:hover{background:#1a4a8a;color:#fff;border-color:#1a4a8a}
.starter-note{font-size:.82rem;color:#666;margin-top:10px}
.result-count{font-size:.85rem;color:#888;margin-bottom:12px;padding-left:2px}
.cat-section{margin-bottom:24px}
.cat-title{font-size:1rem;font-weight:700;color:#1a4a8a;background:#eef2fb;border-radius:6px 6px 0 0;padding:8px 14px;display:flex;align-items:center;gap:8px}
.cat-icon{font-size:1.1em}
.article-list{background:#fff;border-radius:0 0 8px 8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.article-list li{list-style:none;border-bottom:1px solid #eef0f5}
.article-list li:last-child{border-bottom:none}
.article-list a{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;color:#1a4a8a;text-decoration:none;font-size:.95rem;transition:background .15s}
.article-list a:hover{background:#f0f5ff}
.article-list a::after{content:"›";color:#aaa;font-size:1.2em;flex-shrink:0}
.no-result{text-align:center;padding:40px 20px;color:#888;background:#fff;border-radius:8px}
.no-result-icon{font-size:2.5rem;margin-bottom:8px}
footer{text-align:center;padding:20px;font-size:.8rem;color:#999;border-top:1px solid #dde3f0;background:#fff}
footer a{color:#999}
@media(max-width:600px){header h1{font-size:1.3rem}.filter-btn{font-size:.8rem;padding:5px 10px}.article-list a{font-size:.88rem}}
</style>
</head>
<body>
<header>
  <h1>管理組合の教科書</h1>
  <p>マンション管理組合の実務を、理事の立場で解説します</p>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <input type="search" id="searchBox" placeholder="記事を検索（例：議事録、管理会社変更、修繕積立金…）" autocomplete="off">
    <button class="search-clear" id="clearBtn" title="クリア" style="display:none">✕</button>
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-btns" id="filterBtns">
    <button class="filter-btn active" data-cat="all">すべて</button>
    <button class="filter-btn" data-cat="理事・基本">📋 理事・基本</button>
    <button class="filter-btn" data-cat="管理会社">🏢 管理会社</button>
    <button class="filter-btn" data-cat="総会・議事録">📝 総会・議事録</button>
    <button class="filter-btn" data-cat="管理費・積立金">💰 管理費・積立金</button>
    <button class="filter-btn" data-cat="大規模修繕">🔨 大規模修繕</button>
    <button class="filter-btn" data-cat="トラブル">⚠️ トラブル</button>
    <button class="filter-btn" data-cat="規約・法律">⚖️ 規約・法律</button>
  </div>
</div>

<div class="main">
  <div class="lead">理事になったばかりの方、初めて理事長を引き受けた方向けに、管理組合の実務でよくある疑問を解説します。全<strong>30記事</strong>・無料。</div>
  <div class="hero-image">
    <img src="assets/hero-trust-condominium.png" alt="信頼感のあるマンション管理のイメージ" loading="eager" width="1600" height="720">
  </div>
  <section class="starter" aria-label="初めての人向け導線">
    <div class="starter-title">いま困っていることは？</div>
    <div class="starter-grid">
      <a href="docs/kanrikumiai-riji-saishoni.html">理事になったばかり</a>
      <a href="docs/kanrikumiai-richocho-yakuwari.html">理事長になった</a>
      <a href="docs/kanrisha-henkou-tetsuzuki.html">管理会社に不満がある</a>
      <a href="docs/kanrikumiai-sokai-hirakata.html">総会の準備をしたい</a>
      <a href="docs/kanrikumiai-sokai-gijiroku.html">議事録の書き方を知りたい</a>
      <a href="docs/shuzen-tsumitate-neage-setsumei.html">修繕積立金で悩んでいる</a>
      <a href="docs/daikibo-shuzen-susumekata.html">大規模修繕を進めたい</a>
      <a href="docs/mansion-soon-trouble-taiou.html">騒音・ペット等のトラブル</a>
    </div>
    <div class="starter-note">初めての方は、近い悩みから読むと全体像をつかみやすくなります。記事一覧や検索からも探せます。</div>
  </section>
  <div class="result-count" id="resultCount"></div>
  <div id="articleContainer"></div>
  <div class="no-result" id="noResult" style="display:none">
    <div class="no-result-icon">🔍</div>
    <p>「<span id="noResultKeyword"></span>」に一致する記事が見つかりませんでした。</p>
  </div>
</div>

<footer>
  <p><a href="privacy.html">プライバシーポリシー</a> ｜ <a href="disclaimer.html">免責事項</a></p>
  <p style="margin-top:6px">© 管理組合の教科書</p>
</footer>

<script>
const ARTICLES = [
  {slug:"kanrikumiai-riji-saishoni",title:"管理組合の理事になったら最初にやること｜初回理事会までの実務チェックリスト",cat:"理事・基本"},
  {slug:"kanrikumiai-richocho-yakuwari",title:"管理組合の理事長の役割を初心者向けに解説｜抱え込まない進め方",cat:"理事・基本"},
  {slug:"kanrikumiai-shorui-hokan",title:"管理組合の書類保管方法｜理事交代で困らないための整理術",cat:"理事・基本"},
  {slug:"rijijai-susumekata-gidai",title:"理事会の進め方と議題整理｜短時間で話し合いを終えるための基本",cat:"理事・基本"},
  {slug:"kanrisha-henkou-tetsuzuki",title:"マンション管理会社の変更手順｜理事会が最初に確認する流れ",cat:"管理会社"},
  {slug:"kanri-itaku-minaoshi-check",title:"管理委託契約の見直しチェックリスト｜管理会社任せにしない確認ポイント",cat:"管理会社"},
  {slug:"kanrisha-hikaku-mirubekikoumoku",title:"管理会社を比較するときに見るべき項目｜理事会で確認したい基本ポイント",cat:"管理会社"},
  {slug:"kanrisha-henkou-sokai-nagare",title:"管理会社変更の総会の流れ｜理事会が準備する資料と進め方",cat:"管理会社"},
  {slug:"kanrihi-minaosu-hoho",title:"管理費の見直し方法｜管理組合が確認したい実務ポイント",cat:"管理会社"},
  {slug:"kanrikumiai-jishukanri-hajimekata",title:"管理組合の自主管理の始め方｜メリット・デメリットと手順",cat:"管理会社"},
  {slug:"kanrikumiai-sokai-hirakata",title:"管理組合総会の開き方を初心者向けに解説｜準備から当日進行まで",cat:"総会・議事録"},
  {slug:"kanrikumiai-sokai-gijiroku",title:"管理組合総会の議事録の書き方｜残すべき項目と作成手順",cat:"総会・議事録"},
  {slug:"rijijai-gijiroku-kakikata",title:"マンション理事会議事録の書き方｜次回に困らない記録の残し方",cat:"総会・議事録"},
  {slug:"sokai-gian-tsukurikata",title:"総会議案の作り方｜理事会で決めた内容を分かりやすく伝える基本",cat:"総会・議事録"},
  {slug:"shuzen-tsumitate-neage-setsumei",title:"修繕積立金の値上げを説明する方法｜理事会が準備する資料と伝え方",cat:"管理費・積立金"},
  {slug:"kanrihi-tsumitate-chigai",title:"管理費と修繕積立金の違い｜理事になったら最初に押さえる会計の基本",cat:"管理費・積立金"},
  {slug:"shuzen-tsumitatekin-fusoku-taiou",title:"修繕積立金が不足するときの対策と値上げの進め方",cat:"管理費・積立金"},
  {slug:"daikibo-shuzen-susumekata",title:"大規模修繕の進め方｜管理組合が最初に押さえる全体手順",cat:"大規模修繕"},
  {slug:"choki-shuzenkeikaku-minaoshi-timing",title:"長期修繕計画を見直すタイミング｜管理組合が確認したい判断材料",cat:"大規模修繕"},
  {slug:"daikibo-shuzen-mitsumori-hikaku",title:"大規模修繕の見積もり比較ポイント｜金額だけで判断しないための見方",cat:"大規模修繕"},
  {slug:"mansion-soon-trouble-taiou",title:"マンション騒音トラブルで管理組合ができる対応｜理事会の進め方",cat:"トラブル"},
  {slug:"mansion-kujou-taiou-bunrei",title:"マンション苦情対応の文例｜管理組合が使いやすい伝え方",cat:"トラブル"},
  {slug:"kanrikumiai-trouble-kiroku",title:"管理組合のトラブル記録方法｜あとで困らないための残し方",cat:"トラブル"},
  {slug:"kanrikumiai-pet-trouble-taiou",title:"管理組合のペットトラブル対応｜理事会が取るべき初動と流れ",cat:"トラブル"},
  {slug:"mansion-chushajo-kanri-mondai",title:"マンション駐車場の管理問題｜管理組合が対処すべきポイント",cat:"トラブル"},
  {slug:"mansion-taino-kanrikumiai-taiou",title:"マンション管理費の滞納に管理組合はどう対応するか",cat:"トラブル"},
  {slug:"kanrikiyaku-kaisei-tetsuzuki",title:"管理規約の改正手順｜管理組合が進める流れと注意点",cat:"規約・法律"},
  {slug:"shiyosaisoku-minaoshi-hoho",title:"使用細則の見直し方法｜管理組合が確認したい実務ポイント",cat:"規約・法律"},
  {slug:"kubunshoyuho-wakariyasuku",title:"区分所有法をわかりやすく解説｜管理組合が知るべき基本",cat:"規約・法律"},
  {slug:"kanrikumiai-hojinka-merit",title:"管理組合の法人化のメリットと手続きの基本",cat:"規約・法律"},
];

const CAT_ICONS = {
  "理事・基本":"📋","管理会社":"🏢","総会・議事録":"📝",
  "管理費・積立金":"💰","大規模修繕":"🔨","トラブル":"⚠️","規約・法律":"⚖️"
};

const container = document.getElementById('articleContainer');
const noResult = document.getElementById('noResult');
const noResultKeyword = document.getElementById('noResultKeyword');
const resultCount = document.getElementById('resultCount');
const searchBox = document.getElementById('searchBox');
const clearBtn = document.getElementById('clearBtn');
const filterBtns = document.querySelectorAll('.filter-btn');

let currentCat = 'all';
let currentQuery = '';

function render() {
  const q = currentQuery.trim().toLowerCase();
  let filtered = ARTICLES.filter(a => {
    const catMatch = currentCat === 'all' || a.cat === currentCat;
    const qMatch = !q || a.title.toLowerCase().includes(q) || a.cat.toLowerCase().includes(q);
    return catMatch && qMatch;
  });

  if (filtered.length === 0) {
    container.innerHTML = '';
    noResult.style.display = 'block';
    noResultKeyword.textContent = q || currentCat;
    resultCount.textContent = '';
    return;
  }
  noResult.style.display = 'none';

  // カテゴリ別にグループ化
  const cats = {};
  filtered.forEach(a => {
    if (!cats[a.cat]) cats[a.cat] = [];
    cats[a.cat].push(a);
  });

  // カテゴリ順序を固定
  const catOrder = ["理事・基本","管理会社","総会・議事録","管理費・積立金","大規模修繕","トラブル","規約・法律"];
  const orderedCats = currentCat === 'all'
    ? catOrder.filter(c => cats[c])
    : [currentCat];

  let html = '';
  orderedCats.forEach(cat => {
    if (!cats[cat]) return;
    const icon = CAT_ICONS[cat] || '';
    html += `<div class="cat-section">
      <div class="cat-title"><span class="cat-icon">${icon}</span>${cat}</div>
      <ul class="article-list">`;
    cats[cat].forEach(a => {
      const titleDisplay = q
        ? a.title.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m => `<mark style="background:#fff3b0">${m}</mark>`)
        : a.title;
      html += `<li><a href="docs/${a.slug}.html">${titleDisplay}</a></li>`;
    });
    html += `</ul></div>`;
  });

  container.innerHTML = html;
  const total = filtered.length;
  resultCount.textContent = q || currentCat !== 'all'
    ? `${total}件の記事が見つかりました`
    : `全${total}記事`;
}

searchBox.addEventListener('input', e => {
  currentQuery = e.target.value;
  clearBtn.style.display = currentQuery ? 'block' : 'none';
  render();
});

clearBtn.addEventListener('click', () => {
  searchBox.value = '';
  currentQuery = '';
  clearBtn.style.display = 'none';
  searchBox.focus();
  render();
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

render();
</script>
</body>
</html>
